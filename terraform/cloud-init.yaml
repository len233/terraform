#cloud-config
# Configuration automatique de la VM Ubuntu pour Flask App

package_update: true
package_upgrade: true

packages:
  - python3-pip
  - python3-venv
  - python3-dev
  - build-essential
  - libpq-dev
  - nginx
  - git
  - curl

write_files:
  - path: /etc/systemd/system/flask-app.service
    content: |
      [Unit]
      Description=Flask Application
      After=network.target

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/flask-app
      Environment="AZURE_STORAGE_ACCOUNT=${storage_account_name}"
      Environment="AZURE_STORAGE_KEY=${storage_account_key}"
      ExecStart=/usr/bin/python3 /opt/flask-app/app.py
      Restart=always
      RestartSec=10

      [Install]
      WantedBy=multi-user.target

  - path: /etc/nginx/sites-available/flask-app
    content: |
      server {
          listen 80;
          server_name _;

          location / {
              proxy_pass http://127.0.0.1:5000;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
      }

  - path: /opt/flask-app/requirements.txt
    content: |
      flask==3.0.0
      flask-cors==4.0.0
      azure-storage-blob==12.19.0
      psycopg2-binary==2.9.9
      python-dotenv==1.0.0
      gunicorn==21.2.0

runcmd:
  # Créer le répertoire de l'application
  - mkdir -p /opt/flask-app
  - cd /opt/flask-app

  # Installer les dépendances Python
  - pip3 install --upgrade pip
  - pip3 install -r /opt/flask-app/requirements.txt

  # Télécharger l'application Flask depuis GitHub (à adapter)
  # Alternative: copier le code directement ici
  - |
    cat > /opt/flask-app/app.py << 'EOFAPP'
    """
    Flask Backend Application with Azure Blob Storage and PostgreSQL
    CRUD API pour gérer des fichiers et des données
    """
    import os
    import uuid
    from datetime import datetime
    from flask import Flask, jsonify, request, send_file
    from flask_cors import CORS
    from azure.storage.blob import BlobServiceClient, ContentSettings
    import psycopg2
    from psycopg2.extras import RealDictCursor
    from werkzeug.utils import secure_filename
    import logging

    # Configuration
    app = Flask(__name__)
    CORS(app)

    # Logging
    logging.basicConfig(level=logging.INFO)
    logger = logging.getLogger(__name__)

    # Configuration Azure Storage
    AZURE_STORAGE_ACCOUNT = os.getenv('AZURE_STORAGE_ACCOUNT')
    AZURE_STORAGE_KEY = os.getenv('AZURE_STORAGE_KEY')

    # Configuration Database
    DB_HOST = os.getenv('DB_HOST')
    DB_NAME = os.getenv('DB_NAME')
    DB_USER = os.getenv('DB_USER')
    DB_PASSWORD = os.getenv('DB_PASSWORD')

    # Azure Blob Service Client
    blob_service_client = None
    if AZURE_STORAGE_ACCOUNT and AZURE_STORAGE_KEY:
        connection_string = f"DefaultEndpointsProtocol=https;AccountName={AZURE_STORAGE_ACCOUNT};AccountKey={AZURE_STORAGE_KEY};EndpointSuffix=core.windows.net"
        blob_service_client = BlobServiceClient.from_connection_string(connection_string)

    # Database connection
    def get_db_connection():
        try:
            conn = psycopg2.connect(
                host=DB_HOST,
                database=DB_NAME,
                user=DB_USER,
                password=DB_PASSWORD,
                sslmode='require'
            )
            return conn
        except Exception as e:
            logger.error(f"Database connection error: {e}")
            return None

    # Initialize database tables
    def init_db():
        conn = get_db_connection()
        if conn:
            try:
                cur = conn.cursor()
                cur.execute("""
                    CREATE TABLE IF NOT EXISTS files (
                        id SERIAL PRIMARY KEY,
                        filename VARCHAR(255) NOT NULL,
                        blob_name VARCHAR(255) NOT NULL,
                        container_name VARCHAR(100) NOT NULL,
                        file_type VARCHAR(50),
                        file_size INTEGER,
                        uploaded_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
                        description TEXT
                    )
                """)
                cur.execute("""
                    CREATE TABLE IF NOT EXISTS users (
                        id SERIAL PRIMARY KEY,
                        username VARCHAR(100) UNIQUE NOT NULL,
                        email VARCHAR(255) UNIQUE NOT NULL,
                        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
                    )
                """)
                conn.commit()
                cur.close()
                logger.info("Database initialized successfully")
            except Exception as e:
                logger.error(f"Database initialization error: {e}")
            finally:
                conn.close()

    @app.route('/')
    def home():
        return jsonify({
            "message": "Flask API with Azure Blob Storage and PostgreSQL",
            "status": "running",
            "version": "1.0.0",
            "endpoints": {
                "GET /": "API info",
                "GET /health": "Health check",
                "POST /upload": "Upload file to blob storage",
                "GET /files": "List all files",
                "GET /files/<id>": "Get file details",
                "DELETE /files/<id>": "Delete file",
                "GET /users": "List all users",
                "POST /users": "Create user",
                "GET /users/<id>": "Get user by ID",
                "DELETE /users/<id>": "Delete user"
            }
        })

    @app.route('/health')
    def health():
        db_status = "disconnected"
        storage_status = "disconnected"
        
        conn = get_db_connection()
        if conn:
            db_status = "connected"
            conn.close()
        
        if blob_service_client:
            storage_status = "connected"
        
        return jsonify({
            "status": "healthy",
            "database": db_status,
            "storage": storage_status,
            "timestamp": datetime.now().isoformat()
        })

    # ===== CRUD pour les fichiers (Blob Storage) =====

    @app.route('/upload', methods=['POST'])
    def upload_file():
        if 'file' not in request.files:
            return jsonify({"error": "No file provided"}), 400
        
        file = request.files['file']
        if file.filename == '':
            return jsonify({"error": "No file selected"}), 400
        
        try:
            filename = secure_filename(file.filename)
            blob_name = f"{uuid.uuid4()}_{filename}"
            container_name = request.form.get('container', 'static')
            description = request.form.get('description', '')
            
            # Upload to Azure Blob Storage
            container_client = blob_service_client.get_container_client(container_name)
            blob_client = container_client.get_blob_client(blob_name)
            
            file_content = file.read()
            blob_client.upload_blob(
                file_content,
                overwrite=True,
                content_settings=ContentSettings(content_type=file.content_type)
            )
            
            # Save metadata to database
            conn = get_db_connection()
            if conn:
                cur = conn.cursor()
                cur.execute(
                    """INSERT INTO files (filename, blob_name, container_name, file_type, file_size, description)
                       VALUES (%s, %s, %s, %s, %s, %s) RETURNING id""",
                    (filename, blob_name, container_name, file.content_type, len(file_content), description)
                )
                file_id = cur.fetchone()[0]
                conn.commit()
                cur.close()
                conn.close()
            
            return jsonify({
                "message": "File uploaded successfully",
                "file_id": file_id,
                "filename": filename,
                "blob_name": blob_name,
                "container": container_name,
                "size": len(file_content)
            }), 201
        
        except Exception as e:
            logger.error(f"Upload error: {e}")
            return jsonify({"error": str(e)}), 500

    @app.route('/files', methods=['GET'])
    def list_files():
        try:
            conn = get_db_connection()
            if not conn:
                return jsonify({"error": "Database connection failed"}), 500
            
            cur = conn.cursor(cursor_factory=RealDictCursor)
            cur.execute("SELECT * FROM files ORDER BY uploaded_at DESC")
            files = cur.fetchall()
            cur.close()
            conn.close()
            
            return jsonify({
                "count": len(files),
                "files": files
            }), 200
        
        except Exception as e:
            logger.error(f"List files error: {e}")
            return jsonify({"error": str(e)}), 500

    @app.route('/files/<int:file_id>', methods=['GET'])
    def get_file(file_id):
        try:
            conn = get_db_connection()
            if not conn:
                return jsonify({"error": "Database connection failed"}), 500
            
            cur = conn.cursor(cursor_factory=RealDictCursor)
            cur.execute("SELECT * FROM files WHERE id = %s", (file_id,))
            file_info = cur.fetchone()
            cur.close()
            conn.close()
            
            if not file_info:
                return jsonify({"error": "File not found"}), 404
            
            return jsonify(file_info), 200
        
        except Exception as e:
            logger.error(f"Get file error: {e}")
            return jsonify({"error": str(e)}), 500

    @app.route('/files/<int:file_id>', methods=['DELETE'])
    def delete_file(file_id):
        try:
            conn = get_db_connection()
            if not conn:
                return jsonify({"error": "Database connection failed"}), 500
            
            cur = conn.cursor(cursor_factory=RealDictCursor)
            cur.execute("SELECT * FROM files WHERE id = %s", (file_id,))
            file_info = cur.fetchone()
            
            if not file_info:
                cur.close()
                conn.close()
                return jsonify({"error": "File not found"}), 404
            
            # Delete from Azure Blob Storage
            container_client = blob_service_client.get_container_client(file_info['container_name'])
            blob_client = container_client.get_blob_client(file_info['blob_name'])
            blob_client.delete_blob()
            
            # Delete from database
            cur.execute("DELETE FROM files WHERE id = %s", (file_id,))
            conn.commit()
            cur.close()
            conn.close()
            
            return jsonify({"message": "File deleted successfully"}), 200
        
        except Exception as e:
            logger.error(f"Delete file error: {e}")
            return jsonify({"error": str(e)}), 500

    # ===== CRUD pour les utilisateurs =====

    @app.route('/users', methods=['GET'])
    def list_users():
        try:
            conn = get_db_connection()
            if not conn:
                return jsonify({"error": "Database connection failed"}), 500
            
            cur = conn.cursor(cursor_factory=RealDictCursor)
            cur.execute("SELECT id, username, email, created_at FROM users ORDER BY created_at DESC")
            users = cur.fetchall()
            cur.close()
            conn.close()
            
            return jsonify({"count": len(users), "users": users}), 200
        
        except Exception as e:
            logger.error(f"List users error: {e}")
            return jsonify({"error": str(e)}), 500

    @app.route('/users', methods=['POST'])
    def create_user():
        try:
            data = request.get_json()
            username = data.get('username')
            email = data.get('email')
            
            if not username or not email:
                return jsonify({"error": "Username and email are required"}), 400
            
            conn = get_db_connection()
            if not conn:
                return jsonify({"error": "Database connection failed"}), 500
            
            cur = conn.cursor(cursor_factory=RealDictCursor)
            cur.execute(
                "INSERT INTO users (username, email) VALUES (%s, %s) RETURNING id, username, email, created_at",
                (username, email)
            )
            user = cur.fetchone()
            conn.commit()
            cur.close()
            conn.close()
            
            return jsonify({"message": "User created", "user": user}), 201
        
        except Exception as e:
            logger.error(f"Create user error: {e}")
            return jsonify({"error": str(e)}), 500

    @app.route('/users/<int:user_id>', methods=['GET'])
    def get_user(user_id):
        try:
            conn = get_db_connection()
            if not conn:
                return jsonify({"error": "Database connection failed"}), 500
            
            cur = conn.cursor(cursor_factory=RealDictCursor)
            cur.execute("SELECT id, username, email, created_at FROM users WHERE id = %s", (user_id,))
            user = cur.fetchone()
            cur.close()
            conn.close()
            
            if not user:
                return jsonify({"error": "User not found"}), 404
            
            return jsonify(user), 200
        
        except Exception as e:
            logger.error(f"Get user error: {e}")
            return jsonify({"error": str(e)}), 500

    @app.route('/users/<int:user_id>', methods=['DELETE'])
    def delete_user(user_id):
        try:
            conn = get_db_connection()
            if not conn:
                return jsonify({"error": "Database connection failed"}), 500
            
            cur = conn.cursor()
            cur.execute("DELETE FROM users WHERE id = %s RETURNING id", (user_id,))
            deleted = cur.fetchone()
            
            if not deleted:
                cur.close()
                conn.close()
                return jsonify({"error": "User not found"}), 404
            
            conn.commit()
            cur.close()
            conn.close()
            
            return jsonify({"message": "User deleted successfully"}), 200
        
        except Exception as e:
            logger.error(f"Delete user error: {e}")
            return jsonify({"error": str(e)}), 500

    if __name__ == '__main__':
        # Initialize database on startup
        init_db()
        
        # Start Flask application
        app.run(host='0.0.0.0', port=5000, debug=False)
    EOFAPP

  # Configurer Nginx
  - rm -f /etc/nginx/sites-enabled/default
  - ln -s /etc/nginx/sites-available/flask-app /etc/nginx/sites-enabled/
  - systemctl restart nginx

  # Démarrer le service Flask
  - systemctl daemon-reload
  - systemctl enable flask-app
  - systemctl start flask-app

  # Attendre quelques secondes pour que l'app démarre
  - sleep 10

  # Vérifier le statut
  - systemctl status flask-app

final_message: "Flask application deployed successfully! Access it at http://YOUR_VM_IP:5000"
